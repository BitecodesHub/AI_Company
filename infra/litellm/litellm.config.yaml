# LiteLLM gateway configuration for Bitecodes.
# Model groups map to the three cost tiers defined in ARCHITECTURE.md §8.

model_list:
  # ── fast tier (cost-optimised) ───────────────────────────────────────────────
  - model_name: fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: fast
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: fast
    litellm_params:
      model: openrouter/google/gemini-flash-1.5
      api_key: os.environ/OPENROUTER_API_KEY

  # ── smart tier (frontier reasoning) ──────────────────────────────────────────
  - model_name: smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: smart
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: smart
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY

  # ── auto tier (routes by heuristic in ModelRouter) ───────────────────────────
  - model_name: auto
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── embedding model ───────────────────────────────────────────────────────────
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  allowed_fails: 2

litellm_settings:
  success_callback: []
  failure_callback: []
  cache: false
