version: "3.9"
# Bitecodes — production docker-compose.
# Usage: docker compose -f docker-compose.yml -f infra/compose/docker-compose.prod.yml up -d
#
# Assumptions:
#   - Your .env is filled with production secrets.
#   - A managed Postgres (e.g. Neon, Supabase, RDS) is preferred over the container.
#   - Caddy or Traefik handles TLS termination in front of this stack.

services:
  # ── Override web for production ───────────────────────────────────────────────
  web:
    profiles: ["full"]
    environment:
      NODE_ENV: production
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          memory: 512M

  # ── Override api for production ───────────────────────────────────────────────
  api:
    profiles: ["full"]
    environment:
      NODE_ENV: production
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          memory: 1G

  # ── Caddy reverse proxy + automatic TLS ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: bitecodes-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - bitecodes

volumes:
  caddy_data:
  caddy_config:
