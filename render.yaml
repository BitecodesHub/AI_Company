# Render Blueprint — deploys Bitecodes from the single ./Dockerfile.
#
# ONE web service runs the WHOLE product: the combined `app` role serves the
# Next.js web app on $PORT and the NestJS API on localhost:4000, the web app
# proxies the API same-origin, AND the container runs its OWN PostgreSQL 16 +
# pgvector on localhost:5432. No external database is required — the single
# container is fully self-contained.
#
# PERSISTENCE: the database lives on a Render disk mounted at
# /var/lib/postgresql/data, so data survives deploys and restarts. (Without a
# disk the DB is recreated empty on each deploy; the app self-heals the schema
# and the demo account auto-provisions, but user data would not persist.)
#
# For a horizontally-scaled or higher-traffic deployment, switch to a managed
# Postgres instead: add a `databases:` entry, set DATABASE_URL +
# DATABASE_SUPERUSER_URL from it, and remove EMBEDDED_DB / the disk. The
# entrypoint uses the external database automatically when DATABASE_URL is set.

services:
  - type: web
    name: bitecodes-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter            # a paid instance type is required to attach a disk
    healthCheckPath: /
    disk:
      name: bitecodes-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: SERVICE
        value: app             # combined API + web (+ embedded Postgres)
      - key: EMBEDDED_DB
        value: "1"             # run the bundled Postgres on localhost:5432
      - key: NODE_ENV
        value: production
      - key: AI_GATEWAY_MODE
        value: mock            # set blank + AI_PROVIDER/key to go live
      - key: AUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: INNGEST_DEV
        value: "1"
      # RENDER_EXTERNAL_URL (full https URL, injected automatically) is the app's
      # public origin — used as a trusted auth origin and the SEO canonical base.
      - key: NEXT_PUBLIC_APP_URL
        fromService: { name: bitecodes-app, type: web, property: host }
