# Render Blueprint — deploys Bitecodes from the single ./Dockerfile.
#
# ONE web service runs the whole product: the combined `app` role serves the
# Next.js web app on $PORT and the NestJS API on localhost:4000, and the web app
# proxies the API same-origin. No API URL is configured anywhere — the browser
# only ever talks to the public app URL. The DB migrate (pgvector + schema + RLS)
# runs as a pre-deploy step.
#
# NOTE on Postgres: Render's managed Postgres user is the database OWNER (not a
# superuser). It CAN enable pgvector and push the schema. Because the schema
# uses FORCE ROW LEVEL SECURITY, RLS is enforced even for the owner, so the app
# connects with the same Render connection string for both DATABASE_URL and
# DATABASE_SUPERUSER_URL. The separate `bitecodes_app` role from setup-rls.sql is
# only needed on a self-managed superuser Postgres; on Render it is skipped.

databases:
  - name: bitecodes-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: keyvalue            # Redis-compatible
    name: bitecodes-redis
    plan: free
    ipAllowList: []

  - type: web
    name: bitecodes-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /
    preDeployCommand: "SERVICE=migrate bash infra/docker/entrypoint.sh"
    envVars:
      - key: SERVICE
        value: app             # combined API + web
      - key: NODE_ENV
        value: production
      - key: AI_GATEWAY_MODE
        value: mock            # set blank + AI_PROVIDER/key to go live
      - key: DATABASE_URL
        fromDatabase: { name: bitecodes-db, property: connectionString }
      - key: DATABASE_SUPERUSER_URL
        fromDatabase: { name: bitecodes-db, property: connectionString }
      - key: REDIS_URL
        fromService: { name: bitecodes-redis, type: keyvalue, property: connectionString }
      - key: AUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: INNGEST_DEV
        value: "1"
      # RENDER_EXTERNAL_URL (full https URL, injected automatically) is the app's
      # public origin — used as a trusted auth origin and the SEO canonical base.
      - key: NEXT_PUBLIC_APP_URL
        fromService: { name: bitecodes-app, type: web, property: host }
